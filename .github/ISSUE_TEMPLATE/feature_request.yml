name: Feature request
description: Suggest an improvement for NexLog.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What analyst workflow, detection gap, or deployment need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Desktop GUI
        - Web cockpit/API
        - Detection rules
        - Parsers
        - Reports/exports
        - Threat intelligence
        - AI assistant
        - Packaging/release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
