name: NexLog Automated Release

on:
  push:
    tags:
      - "v*"  # Triggers on v1.0.0, v1.0.0-alpha, etc.

permissions:
  contents: write

env:
  NEXLOG_VERSION: ${{ github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-binaries:
    name: Build Binary for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
            build_arg: --windows-installer
            artifact_glob: release/*windows-x64-setup.exe
          - os: ubuntu-latest
            artifact_name: linux-x64
            build_arg: --linux-packages
            artifact_glob: |
              release/*linux-x64.deb
              release/*linux-x64.tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0

      - name: Install Windows installer compiler
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Install release dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install \
            "pytest>=8.0.0" \
            "PySide6>=6.6.0" \
            "numpy>=1.26.0" \
            "scikit-learn>=1.4.0" \
            "reportlab>=4.0.0" \
            "PyYAML>=6.0.1" \
            "python-evtx>=0.7.4" \
            "maxminddb>=2.4.0" \
            "pyinstaller>=6.0.0"

      - name: Run release check
        run: python scripts/release_check.py

      - name: Build app installer packages
        run: python scripts/package_release.py ${{ matrix.build_arg }} --skip-check

      - name: Smoke test Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter '*windows-x64-setup.exe' | Select-Object -First 1
          if (-not $installer) { throw 'Windows setup installer was not created.' }
          $target = Join-Path $env:RUNNER_TEMP 'NexLogInstall'
          $args = @('/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', "/DIR=$target")
          Start-Process -FilePath $installer.FullName -ArgumentList $args -Wait -NoNewWindow
          Push-Location $target
          & "$target\NexLog\NexLog.exe" --packaged-check
          & "$target\nexlog\nexlog.exe" --help
          & "$target\nexlog\nexlog.exe" examples/logs/Apache_2k.log --summary --quiet
          Pop-Location

      - name: Smoke test Linux packages
        if: runner.os == 'Linux'
        run: |
          test -f release/NexLog-v${NEXLOG_VERSION#v}-linux-x64.deb
          test -f release/NexLog-v${NEXLOG_VERSION#v}-linux-x64.tar.gz
          dpkg-deb --contents release/NexLog-v${NEXLOG_VERSION#v}-linux-x64.deb
          sudo apt-get install -y ./release/NexLog-v${NEXLOG_VERSION#v}-linux-x64.deb
          cd /opt/nexlog
          QT_QPA_PLATFORM=offscreen QT_QUICK_BACKEND=software QSG_RHI_BACKEND=software nexlog-gui --packaged-check
          nexlog --help
          nexlog examples/logs/Apache_2k.log --summary --quiet
          cd "$GITHUB_WORKSPACE"
          mkdir -p "$RUNNER_TEMP/nexlog-tar"
          tar -xzf release/NexLog-v${NEXLOG_VERSION#v}-linux-x64.tar.gz -C "$RUNNER_TEMP/nexlog-tar"
          cd "$RUNNER_TEMP/nexlog-tar/NexLog"
          QT_QPA_PLATFORM=offscreen QT_QUICK_BACKEND=software QSG_RHI_BACKEND=software "$RUNNER_TEMP/nexlog-tar/NexLog/NexLog/NexLog" --packaged-check
          "$RUNNER_TEMP/nexlog-tar/NexLog/nexlog/nexlog" --help
          "$RUNNER_TEMP/nexlog-tar/NexLog/nexlog/nexlog" examples/logs/Apache_2k.log --summary --quiet

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-app
          path: |
            ${{ matrix.artifact_glob }}

  create-github-release:
    name: Create GitHub Release
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows app
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-app
          path: ./downloads

      - name: Download Linux app
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-app
          path: ./downloads

      - name: Check downloaded files
        run: ls -R ./downloads

      - name: Create checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd downloads
          sha256sum NexLog-v${VERSION}-windows-x64-setup.exe NexLog-v${VERSION}-linux-x64.deb NexLog-v${VERSION}-linux-x64.tar.gz > NexLog-v${VERSION}-checksums.txt

      - name: Create release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "## NexLog Release ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### Download The App" >> release_notes.md
          echo "- **Windows**: Download \`NexLog-v${VERSION}-windows-x64-setup.exe\` and run the installer." >> release_notes.md
          echo "- **Linux Debian/Ubuntu**: Download \`NexLog-v${VERSION}-linux-x64.deb\` and install with \`sudo apt install ./NexLog-v${VERSION}-linux-x64.deb\`." >> release_notes.md
          echo "- **Other Linux**: Download \`NexLog-v${VERSION}-linux-x64.tar.gz\`, extract it, and run \`./NexLog\`." >> release_notes.md
          echo "" >> release_notes.md
          echo "### Unsigned Portable Build Notes" >> release_notes.md
          echo "- Windows may show a SmartScreen warning because this first release is not Authenticode signed." >> release_notes.md
          echo "- Linux tarball users may need to run \`chmod +x NexLog nexlog\` after extracting the archive." >> release_notes.md

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: true
          prerelease: false
          files: |
            ./downloads/**/*.exe
            ./downloads/**/*.deb
            ./downloads/**/*.tar.gz
            ./downloads/**/*checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
