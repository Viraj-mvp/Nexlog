name: NexLog Automated Release

on:
  push:
    tags:
      - "v*"  # Triggers on v1.0.0, v1.0.0-alpha, etc.

permissions:
  contents: write

env:
  NEXLOG_VERSION: ${{ github.ref_name }}

jobs:
  build-source:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run release check
        run: python scripts/release_check.py

      - name: Build source ZIP
        run: python scripts/package_release.py --source-zip

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-zip
          path: release/*.zip

  build-binaries:
    name: Build Binary for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-x64
            build_arg: --exe
          - os: ubuntu-latest
            artifact_name: linux-x64
            build_arg: --binary
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build binary ZIP bundle
        run: python scripts/package_release.py ${{ matrix.build_arg }} --skip-check

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-zip
          path: release/*.zip

  create-github-release:
    name: Create GitHub Release
    needs: [build-source, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download source ZIP
        uses: actions/download-artifact@v4
        with:
          name: source-zip
          path: ./downloads

      - name: Download Windows ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-x64-zip
          path: ./downloads

      - name: Download Linux ZIP
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-zip
          path: ./downloads

      - name: Check downloaded files
        run: ls -R ./downloads

      - name: Create release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "## NexLog Release ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### Release Assets" >> release_notes.md
          echo "- **Windows Executable Bundle**: Portable 64-bit Windows GUI app plus logs and config templates." >> release_notes.md
          echo "- **Linux Binary Bundle**: Portable 64-bit Linux GUI/CLI binary plus accessories." >> release_notes.md
          echo "- **Clean Source Archive**: Python/FastAPI/PySide6 source code without local generated artifacts." >> release_notes.md
          echo "" >> release_notes.md
          echo "### Unsigned Portable Build Notes" >> release_notes.md
          echo "- Windows may show a SmartScreen warning because this first release is not Authenticode signed." >> release_notes.md
          echo "- Linux users may need to run \`chmod +x NexLog\` after extracting the ZIP." >> release_notes.md
          echo "" >> release_notes.md
          echo "### Quick Installation" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "# Install directly using pip from the source archive:" >> release_notes.md
          echo "pip install 'https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/NexLog-v${VERSION}-source.zip[all]'" >> release_notes.md
          echo "\`\`\`" >> release_notes.md

      - name: Draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          draft: true
          prerelease: false
          files: ./downloads/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
